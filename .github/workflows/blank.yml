name: CI

on: 
    schedule:
        - cron: "45 15 * * 1-5"
         
    workflow_dispatch:      
          
jobs:
 
  build:
  
    runs-on: ubuntu-latest

    steps:
    
      - name: Получи код из уд. репозитория
        uses: actions/checkout@v4  

      - name: Установка Node.js
        uses: actions/setup-node@v4 
        with:
          node-version: '18'  

      - name: Установка Newman
        run: npm install -g newman  
        
      - name: Установка HTML Extra Reporter
        run: npm install -g newman-reporter-htmlextra
        
      - name: Установка JSON Reporter
        run: npm install -g newman-reporter-json 
        
      - name: Создание директории для отчетов
        run: mkdir -p test-results  
        
      - name: Запуск тестов с формированием отчетов
        run: |
          newman run Maxim_Trello.postman_collection.json \
            -e Trello_Environment.postman_environment.json \
            -r htmlextra,json \
            --reporter-htmlextra-export test-results/html-report.html \
            --reporter-json-export test-results/json-report.json
        
      - name: Загрузка HTML отчета как артефакт
        uses: actions/upload-artifact@v4
        with:
          name: html-test-report
          path: test-results/html-report.html
          
      - name: Загрузка JSON отчета как артефакт
        uses: actions/upload-artifact@v4
        with:
          name: json-test-report
          path: test-results/json-report.json